<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning English · Mini-story + comprehension</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel-2: #232730;
    --text: #e8eaf0; --muted: #8a91a0; --accent: #6aa6ff;
    --good: #4ade80; --hard: #fbbf24; --bad: #f87171; --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
  }
  header { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .back-link { color: var(--muted); text-decoration: none; font-size: 13px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select, .btn { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: var(--panel-2); }
  .big-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .big-btn:hover { opacity: 0.9; }

  .story-card {
    width: 100%; max-width: 720px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; margin-bottom: 16px;
  }
  .story-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; background: var(--panel-2); color: var(--muted); }
  .pill.topic { background: rgba(106, 166, 255, 0.15); color: var(--accent); }
  .pill.level { background: rgba(74, 222, 128, 0.12); color: var(--good); }
  .story-title { font-size: 26px; font-weight: 700; margin: 0 0 18px 0; }
  .story-body { font-size: 17px; line-height: 1.75; }
  .story-body p { margin: 0 0 16px 0; }
  .vocab-word {
    color: var(--accent); font-weight: 600; border-bottom: 1px dotted var(--accent);
    cursor: help; position: relative;
  }
  .vocab-word:hover { background: rgba(106, 166, 255, 0.1); border-radius: 3px; }
  .vocab-tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; min-width: 220px; max-width: 280px;
    font-size: 12px; color: var(--text); font-weight: normal;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5); z-index: 10; text-align: left;
    line-height: 1.5;
  }
  .vocab-tooltip .tw { color: var(--accent); font-weight: 600; }
  .vocab-tooltip .ts { color: var(--muted); font-style: italic; }
  .vocab-word:not(:hover) .vocab-tooltip { display: none; }

  .vocab-list {
    width: 100%; max-width: 720px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
  }
  .vocab-list-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .vocab-list-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .vocab-chip { background: var(--panel-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 8px; font-size: 12px; color: var(--accent); }

  .nav-row {
    width: 100%; max-width: 720px; display: flex; justify-content: space-between; gap: 10px; margin-bottom: 16px;
  }

  .question-card {
    width: 100%; max-width: 720px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin-bottom: 16px;
  }
  .q-counter { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 18px; line-height: 1.5; margin-bottom: 18px; }
  .q-options { display: flex; flex-direction: column; gap: 10px; }
  .q-option {
    background: var(--panel-2); color: var(--text); border: 2px solid var(--border);
    border-radius: 10px; padding: 14px 16px; font-size: 15px; cursor: pointer; font-family: inherit;
    text-align: left; transition: all 0.1s; display: flex; gap: 10px; align-items: flex-start;
  }
  .q-option:hover:not(:disabled) { background: var(--panel); border-color: #3a4050; }
  .q-option:disabled { cursor: default; }
  .q-option .letter { width: 22px; height: 22px; border-radius: 5px; background: var(--bg); color: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .q-option.correct { border-color: var(--good); background: rgba(74, 222, 128, 0.1); color: var(--good); }
  .q-option.wrong { border-color: var(--bad); background: rgba(248, 113, 113, 0.1); color: var(--bad); }
  .q-feedback { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .q-feedback.good { background: rgba(74, 222, 128, 0.08); color: var(--good); border: 1px solid rgba(74, 222, 128, 0.25); }
  .q-feedback.bad { background: rgba(248, 113, 113, 0.08); color: var(--bad); border: 1px solid rgba(248, 113, 113, 0.25); }

  .results { width: 100%; max-width: 720px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .results h2 { margin: 0 0 16px 0; font-size: 22px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--panel-2); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-num.good { color: var(--good); }
  .stat-num.bad { color: var(--bad); }
  .stat-num.accent { color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .json-box { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--muted); max-height: 180px; overflow: auto; margin: 12px 0; }
  .end-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .hidden { display: none !important; }
  .footer { color: var(--muted); font-size: 11px; margin-top: 24px; text-align: center; }
</style>
</head>
<body>

<header>
  <div>
    <a href="index.html" class="back-link">← Hub</a>
    <h1 style="display:inline-block; margin-left:12px;">📖 Mini-story + comprehension</h1>
  </div>
  <div class="controls">
    <select id="story-select"></select>
  </div>
</header>

<div id="read-view">
  <div class="story-card">
    <div class="story-meta" id="story-meta"></div>
    <h2 class="story-title" id="story-title"></h2>
    <div class="story-body" id="story-body"></div>
  </div>

  <div class="vocab-list">
    <div class="vocab-list-title">📚 Vocabulario que aparece</div>
    <div class="vocab-list-items" id="vocab-list-items"></div>
  </div>

  <div class="nav-row">
    <button class="btn" id="reread-btn">🔁 Releer</button>
    <button class="big-btn" id="quiz-btn">Take comprehension quiz →</button>
  </div>
</div>

<div id="quiz-view" class="hidden">
  <div class="question-card">
    <div class="q-counter" id="q-counter"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-options" id="q-options"></div>
    <div id="q-feedback" class="q-feedback hidden"></div>
  </div>
  <div class="nav-row">
    <button class="btn" id="back-to-story-btn">← Volver al story</button>
    <button class="big-btn hidden" id="next-q-btn">Next →</button>
  </div>
</div>

<div id="results-view" class="results hidden">
  <h2>🎉 Quiz complete</h2>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num good" id="r-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-card"><div class="stat-num bad" id="r-wrong">0</div><div class="stat-label">Wrong</div></div>
    <div class="stat-card"><div class="stat-num accent" id="r-acc">0%</div><div class="stat-label">Accuracy</div></div>
  </div>
  <div style="font-size: 13px; color: var(--muted); margin-bottom: 8px;">JSON para que Claude registre tu progreso con este topic:</div>
  <div class="json-box" id="json-box"></div>
  <div class="end-actions">
    <button class="btn" id="copy-btn">📋 Copy JSON</button>
    <button class="btn" id="another-btn">📚 Otra historia</button>
    <button class="btn" id="retry-btn">🔄 Repetir esta</button>
  </div>
</div>

<div class="footer">Pasá el mouse por las palabras subrayadas para ver su significado · Cada historia mezcla vocab + un topic</div>

<script src="vocab.js"></script>

const $ = (id) => document.getElementById(id);
const vocabById = (id) => window.VOCAB.find((v) => v.id === id);

let state = {
  storyIndex: 0,
  qIndex: 0,
  answers: [],
  answered: false,
  sessionStart: null,
};

function init() {
  const sel = $('story-select');
  STORIES.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${s.title} · ${s.topic}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    state.storyIndex = parseInt(e.target.value, 10);
    loadStory();
  });
  loadStory();
}

function loadStory() {
  const story = STORIES[state.storyIndex];
  state.qIndex = 0;
  state.answers = [];
  state.answered = false;
  state.sessionStart = new Date().toISOString();

  $('quiz-view').classList.add('hidden');
  $('results-view').classList.add('hidden');
  $('read-view').classList.remove('hidden');

  $('story-title').textContent = story.title;
  $('story-meta').innerHTML = `<span class="pill topic">📍 ${story.topic}</span><span class="pill level">${story.level}</span><span class="pill">${story.vocab_ids.length} palabras</span>`;

  const body = $('story-body');
  body.innerHTML = '';
  story.paragraphs.forEach((p) => {
    const para = document.createElement('p');
    para.innerHTML = renderParagraph(p);
    body.appendChild(para);
  });

  const list = $('vocab-list-items');
  list.innerHTML = '';
  story.vocab_ids.forEach((id) => {
    const v = vocabById(id);
    if (!v) return;
    const chip = document.createElement('span');
    chip.className = 'vocab-chip';
    chip.textContent = v.word;
    chip.title = `${v.meaning} · ${v.es}`;
    list.appendChild(chip);
  });
}

function renderParagraph(text) {
  return text.replace(/\{([^}]+)\}/g, (_, label) => {
    const lc = label.toLowerCase().trim();
    let vocab = window.VOCAB.find((v) =>
      v.word.toLowerCase() === lc ||
      lc.includes(v.word.toLowerCase()) ||
      v.word.toLowerCase().includes(lc.replace(/^(my|the|a|an) /, ''))
    );
    if (!vocab) {
      const base = lc.replace(/^(my|the|a|an) /, '').replace(/s$/, '');
      vocab = window.VOCAB.find((v) => v.word.toLowerCase().includes(base) || base.includes(v.word.toLowerCase().split(' ')[0]));
    }
    if (!vocab) return `<strong>${label}</strong>`;
    const tooltip = `<span class="vocab-tooltip"><span class="tw">${vocab.word}</span> · <span class="ts">${vocab.es}</span><br>${vocab.meaning}</span>`;
    return `<span class="vocab-word">${label}${tooltip}</span>`;
  });
}

function startQuiz() {
  state.qIndex = 0;
  state.answers = [];
  state.answered = false;
  $('read-view').classList.add('hidden');
  $('quiz-view').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const story = STORIES[state.storyIndex];
  const q = story.questions[state.qIndex];
  if (!q) return showResults();
  state.answered = false;

  $('q-counter').textContent = `Question ${state.qIndex + 1} / ${story.questions.length}`;
  $('q-text').textContent = q.q;
  $('q-feedback').classList.add('hidden');
  $('next-q-btn').classList.add('hidden');

  const opts = $('q-options');
  opts.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'q-option';
    btn.dataset.idx = idx;
    btn.innerHTML = `<span class="letter">${String.fromCharCode(65 + idx)}</span> <span>${opt}</span>`;
    opts.appendChild(btn);
  });
}

function answerQuestion(idx) {
  if (state.answered) return;
  state.answered = true;
  const story = STORIES[state.storyIndex];
  const q = story.questions[state.qIndex];
  const correct = idx === q.answer;

  document.querySelectorAll('.q-option').forEach((btn) => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.idx, 10);
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  const fb = $('q-feedback');
  fb.classList.remove('hidden', 'good', 'bad');
  if (correct) {
    fb.classList.add('good');
    fb.innerHTML = `✅ ¡Correcto! <div style="margin-top:6px; color:var(--muted);">${q.explain}</div>`;
  } else {
    fb.classList.add('bad');
    fb.innerHTML = `❌ La respuesta correcta era <strong>${q.options[q.answer]}</strong>.<div style="margin-top:6px; color:var(--muted);">${q.explain}</div>`;
  }

  state.answers.push({ q: q.q, correct: correct, chosen: q.options[idx], answer: q.options[q.answer] });
  $('next-q-btn').classList.remove('hidden');
}

function nextQuestion() {
  state.qIndex++;
  if (state.qIndex >= STORIES[state.storyIndex].questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  $('quiz-view').classList.add('hidden');
  $('results-view').classList.remove('hidden');

  const c = state.answers.filter((a) => a.correct).length;
  const w = state.answers.filter((a) => !a.correct).length;
  const acc = state.answers.length > 0 ? Math.round((c / state.answers.length) * 100) : 0;
  $('r-correct').textContent = c;
  $('r-wrong').textContent = w;
  $('r-acc').textContent = `${acc}%`;

  const story = STORIES[state.storyIndex];
  const payload = {
    exercise: 'mini_story',
    session_start: state.sessionStart,
    session_end: new Date().toISOString(),
    story_id: story.id,
    story_title: story.title,
    topic: story.topic,
    vocab_encountered: story.vocab_ids,
    summary: { correct: c, wrong: w, total: state.answers.length, accuracy_percent: acc },
    answers: state.answers,
  };
  $('json-box').textContent = JSON.stringify(payload, null, 2);
  window._lastPayload = payload;
}

document.addEventListener('click', (e) => {
  const opt = e.target.closest('.q-option');
  if (opt && !state.answered) answerQuestion(parseInt(opt.dataset.idx, 10));
});

$('quiz-btn').addEventListener('click', startQuiz);
$('reread-btn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
$('back-to-story-btn').addEventListener('click', () => {
  $('quiz-view').classList.add('hidden');
  $('read-view').classList.remove('hidden');
});
$('next-q-btn').addEventListener('click', nextQuestion);
$('another-btn').addEventListener('click', () => {
  state.storyIndex = (state.storyIndex + 1) % STORIES.length;
  $('story-select').value = state.storyIndex;
  loadStory();
});
$('retry-btn').addEventListener('click', startQuiz);

$('copy-btn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(JSON.stringify(window._lastPayload, null, 2));
    $('copy-btn').textContent = '✓ Copied!';
    setTimeout(() => ($('copy-btn').textContent = '📋 Copy JSON'), 1500);
  } catch (err) { alert('Copy failed.'); }
});

init();
</script>
</body>
</html>
